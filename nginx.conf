server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    resolver ${DNS_RESOLVER} valid=10s;  #  提供 K8s 部署能選擇 kube-dns  做 DNS 查詢，方便後續 proxy_pass 能動態解析後端 IP
    resolver_timeout 5s;  # 限制 DNS解析的時限，逾時視為失敗

    client_max_body_size        100m;
    client_body_buffer_size     128k;

    proxy_connect_timeout       5s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;
    proxy_buffer_size           4k;
    proxy_buffers               4 32k;
    proxy_busy_buffers_size     64k;
    proxy_temp_file_write_size  64k;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    location /api/ {
        # proxy_pass http://$BACKEND_URL;  # 不適用 K8s: 因在 worker process 啟動當下解析一次 DNS，之後就不再重查。 若 Service ClusterIP 換了，nginx 仍用舊 IP
        set $backend_upstream ${BACKEND_URL}; # $BACKEND_URL 是模板變數（由 entrypoint script / envsubst 注入的環境變數字串）
        proxy_pass http://$backend_upstream;  # 將請求轉發到動態 DNS 解析的後端位址
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ws {
        set $backend_upstream ${BACKEND_URL};
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # STOMP 未設定 server 端 heartbeat，需拉長逾時避免長連線閒置被中斷
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
